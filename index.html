<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Edu Tech - IT Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0b5345; /* Hijau Teal sesuai kartu nama */
            --accent-color: #f1c40f;  /* Kuning Emas */
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f4f7f6;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(11, 83, 69, 0.8), rgba(11, 83, 69, 0.9)), 
                        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-light);
        }

        .logo-main {
            width: 150px;
            margin-bottom: 20px;
        }

        .btn-navigasi {
            padding: 15px 35px;
            background-color: var(--accent-color);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-navigasi:hover {
            transform: scale(1.05);
            background-color: #d4ac0d;
        }

        /* Modal */
        #pwModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 300px;
            margin: 20vh auto;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <section class="hero">
        <img src="logo.png" alt="Logo" class="logo-main">
        <h1>ARIF EDU TECH</h1>
        <p>Expert IT Repair & Digital Solutions</p>
        <br>
        <button class="btn-navigasi" onclick="showModal()">
            <i class="fas fa-database"></i> DATA LAYANAN
        </button>
    </section>

    <div id="pwModal">
        <div class="modal-content">
            <h3 style="margin:0;">Akses Admin</h3>
            <p style="font-size:12px; color:gray;">Masukkan PIN untuk membuka Data Layanan</p>
            <input type="password" id="adminPw" placeholder="Password...">
            <button class="btn-navigasi" style="width:100%" onclick="checkPassword()">MASUK</button>
            <p onclick="hideModal()" style="color:red; cursor:pointer; margin-top:15px; font-size:13px;">Batal</p>
        </div>
    </div>

    <script>
        function showModal() { document.getElementById('pwModal').style.display = 'block'; }
        function hideModal() { document.getElementById('pwModal').style.display = 'none'; }

        function checkPassword() {
            const pass = document.getElementById('adminPw').value;
            // Password default: admin123
            if (pass === 'admin123') {
                window.location.href = 'layanan.html'; 
            } else {
                alert('Password Salah!');
            }
        }
    </script>

</body>
</html>
