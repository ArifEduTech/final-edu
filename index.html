<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Online - ARIF EDU TECH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        .card { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-green { background: var(--success); color: white; }
        .btn-yellow { background: var(--warning); color: black; }
        .btn-red { background: var(--danger); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f1f1f1; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; text-transform: uppercase; cursor: pointer; display: inline-block; }
        #modalNota { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; overflow-y: auto; }
        .modal-content { background:white; max-width:700px; margin: 40px auto; padding:25px; border-radius:12px; }
        @media print { .no-print { display: none !important; } #printArea { display: block !important; } }
        #printArea { display: none; padding: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div id="mainContent" class="container no-print">
    <header>
        <h1 style="color:var(--primary); margin:0;">ARIF EDU TECH 🌐 ONLINE</h1>
        <p style="margin:5px 0;">Manajemen Servis & Nota Digital Real-time</p>
    </header>

    <div class="card">
        <h3>1. Registrasi Pelanggan Baru</h3>
        <div class="grid">
            <div><label>Nama</label><input type="text" id="custName" placeholder="Nama Pelanggan"></div>
            <div><label>Tanggal</label><input type="date" id="entryDate"></div>
            <div><label>Unit</label><input type="text" id="devName" placeholder="Contoh: Laptop Acer"></div>
        </div>
        <textarea id="keluhan" placeholder="Keluhan / Deskripsi Layanan"></textarea>
        <button class="btn btn-blue" id="btnSimpan" onclick="saveToCloud()">💾 SIMPAN & CETAK TANDA TERIMA</button>
    </div>

    <div class="card">
        <h3>2. Database Servis (Real-time Cloud)</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Pelanggan</th>
                        <th>Unit</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="dbBody">
                    <tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalNota" class="no-print">
    <div class="modal-content">
        <h2 id="modalTitle">Rincian Nota Final</h2>
        <div id="itemRows"></div>
        <button class="btn btn-yellow" onclick="addRow()">+ Tambah Item</button>
        <hr>
        <label>Metode Pembayaran</label>
        <select id="payMethod">
            <option>Tunai</option>
            <option>Transfer</option>
            <option>QRIS</option>
        </select>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-green" style="flex:1;" onclick="finalizeNota()">💾 SIMPAN & CETAK NOTA LUNAS</button>
            <button class="btn btn-red" onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="text-align:center; border-bottom: 2px dashed #000; padding-bottom:10px;">
        <h2 style="margin:0;">ARIF EDU TECH</h2>
        <p style="margin:0;">Solusi Teknologi Terpercaya</p>
    </div>
    <div id="notaKonten" style="margin-top:20px;"></div>
    <div id="qrPrint" style="display:flex; justify-content:center; margin:20px 0;"></div>
    <p style="text-align:center; font-size:12px;">Status servis dapat dicek melalui scan QR Code di atas.</p>
</div>

<script>
    // KONFIGURASI SUPABASE
    const SUPABASE_URL = "https://plwpgjwozugznrlwgtwc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_IudfuYPNAbYypJ5_YQ-zng_SJ6tDNYP"; 
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let activeId = null;
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

    // Fungsi Ambil Data
    async function fetchData() {
        try {
            const { data, error } = await supabase
                .from('layanan')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            renderTable(data);
        } catch (err) {
            console.error("Fetch Error:", err.message);
            document.getElementById('dbBody').innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Gagal memuat data: ${err.message}</td></tr>`;
        }
    }

    function renderTable(data) {
        const body = document.getElementById('dbBody');
        body.innerHTML = '';
        if (data.length === 0) {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada data servis.</td></tr>';
            return;
        }
        data.forEach(d => {
            body.innerHTML += `
                <tr>
                    <td><strong>${d.nama}</strong><br><small>${d.tgl}</small></td>
                    <td>${d.barang}</td>
                    <td><span class="badge" style="background:${getStatusColor(d.status)}" onclick="updateProgres('${d.id}','${d.status}')">${d.status}</span></td>
                    <td>
                        <button class="btn btn-green" style="padding:5px 10px;" onclick="openModal('${d.id}')">📝</button>
                        <button class="btn btn-blue" style="padding:5px 10px;" onclick="reprint('${d.id}')">🖨️</button>
                        <button class="btn btn-red" style="padding:5px 10px;" onclick="hapusData('${d.id}')">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    function getStatusColor(s) {
        if(s === 'ceking') return '#6c757d';
        if(s === 'proses') return '#ffc107';
        return '#28a745';
    }

    // Simpan Pelanggan Baru
    async function saveToCloud() {
        const btn = document.getElementById('btnSimpan');
        const payload = {
            nama: document.getElementById('custName').value,
            tgl: document.getElementById('entryDate').value,
            barang: document.getElementById('devName').value,
            keluhan: document.getElementById('keluhan').value,
            status: 'ceking'
        };

        if(!payload.nama || !payload.barang) return alert("Nama dan Unit wajib diisi!");

        btn.disabled = true;
        btn.innerText = "⏳ MENYIMPAN...";

        const { data, error } = await supabase.from('layanan').insert([payload]).select();
        
        if (error) {
            alert("Gagal simpan: " + error.message);
        } else { 
            alert("Data Berhasil Disimpan!");
            // Reset Form
            document.getElementById('custName').value = '';
            document.getElementById('keluhan').value = '';
            fetchData(); 
            printTandaTerima(data[0]); 
        }
        btn.disabled = false;
        btn.innerText = "💾 SIMPAN & CETAK TANDA TERIMA";
    }

    async function updateProgres(id, current) {
        const next = current === 'ceking' ? 'proses' : (current === 'proses' ? 'selesai' : 'ceking');
        await supabase.from('layanan').update({ status: next }).eq('id', id);
        fetchData();
    }

    // Modal Nota Functions
    function openModal(id) {
        activeId = id;
        document.getElementById('itemRows').innerHTML = '';
        addRow();
        document.getElementById('modalNota').style.display = 'block';
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = 'grid';
        div.style.gridTemplateColumns = '2fr 1fr';
        div.style.marginBottom = '10px';
        div.innerHTML = `<input type="text" class="i-desc" placeholder="Item/Service"><input type="number" class="i-price" placeholder="Harga">`;
        document.getElementById('itemRows').appendChild(div);
    }

    async function finalizeNota() {
        const rows = document.querySelectorAll('#itemRows .grid');
        let items = [];
        let total = 0;
        rows.forEach(r => {
            const desc = r.querySelector('.i-desc').value;
            const price = r.querySelector('.i-price').value;
            if(desc && price) { 
                items.push({desc, price: parseInt(price)}); 
                total += parseInt(price); 
            }
        });

        if(items.length === 0) return alert("Isi minimal satu item!");

        const { error } = await supabase.from('layanan').update({ 
            items: items, 
            total: total, 
            status: 'selesai' 
        }).eq('id', activeId);

        if(!error) {
            fetchData();
            closeModal();
            reprint(activeId);
        } else {
            alert("Error: " + error.message);
        }
    }

    async function reprint(id) {
        const { data } = await supabase.from('layanan').select('*').eq('id', id).single();
        if(data.items && data.items.length > 0) printNotaFinal(data);
        else printTandaTerima(data);
    }

    function printTandaTerima(d) {
        const h = `
            <div style="text-align:center;"><strong>TANDA TERIMA SERVIS</strong></div>
            <p>ID: ${d.id}<br>
            Tgl: ${d.tgl}<br>
            Nama: ${d.nama}<br>
            Unit: ${d.barang}<br>
            Keluhan: ${d.keluhan}</p>
            <p style="border-top:1px dashed #000; padding-top:10px;">Status: <b>CEKING</b></p>`;
        doPrint(h, d);
    }

    function printNotaFinal(d) {
        let h = `
            <div style="text-align:center;"><strong>NOTA PELUNASAN</strong></div>
            <p>Nama: ${d.nama}<br>Unit: ${d.barang}</p>
            <table style="width:100%; border-top:1px solid #000;">
                <tr><th style="border:none;">Item</th><th style="border:none;text-align:right;">Harga</th></tr>`;
        d.items.forEach(i => h += `<tr><td style="border:none;">${i.desc}</td><td style="border:none;text-align:right;">${parseInt(i.price).toLocaleString('id-ID')}</td></tr>`);
        h += `</table>
            <h3 style="text-align:right; border-top:1px double #000; padding-top:5px;">TOTAL: Rp ${parseInt(d.total).toLocaleString('id-ID')}</h3>
            <p style="text-align:center;">Metode: ${document.getElementById('payMethod').value}</p>`;
        doPrint(h, d);
    }

    function doPrint(html, d) {
        document.getElementById('notaKonten').innerHTML = html;
        document.getElementById('qrPrint').innerHTML = "";
        // URL untuk tracking (menggunakan parameter URL)
        const trackLink = window.location.origin + window.location.pathname + "?id=" + d.id;
        new QRCode(document.getElementById("qrPrint"), { text: trackLink, width: 120, height: 120 });
        
        setTimeout(() => { 
            window.print(); 
        }, 800);
    }

    async function hapusData(id) { 
        if(confirm("Hapus data ini secara permanen?")) { 
            await supabase.from('layanan').delete().eq('id', id); 
            fetchData(); 
        } 
    }
    
    function closeModal() { document.getElementById('modalNota').style.display = 'none'; }

    // TRACKING HANDLER
    window.onload = async () => {
        const p = new URLSearchParams(window.location.search);
        if(p.has('id')) {
            document.getElementById('mainContent').style.display = 'none';
            const { data, error } = await supabase.from('layanan').select('*').eq('id', p.get('id')).single();
            if(data) {
                document.body.innerHTML = `
                <div style="text-align:center; padding:40px; background:white; min-height:100vh;">
                    <h1 style="color:var(--primary)">ARIF EDU TECH</h1>
                    <div style="border:2px solid #ddd; padding:20px; border-radius:15px; background:#fff; max-width:400px; margin:auto;">
                        <h3 style="margin-bottom:0;">STATUS SERVIS:</h3>
                        <h1 style="color:${getStatusColor(data.status)}; text-transform:uppercase; margin-top:10px;">${data.status}</h1>
                        <hr>
                        <p style="text-align:left;"><b>Unit:</b> ${data.barang}</p>
                        <p style="text-align:left;"><b>Pelanggan:</b> ${data.nama}</p>
                        <p style="text-align:left;"><b>Masalah:</b> ${data.keluhan}</p>
                        <button onclick="location.reload()" class="btn btn-blue">Refresh Status</button>
                    </div>
                </div>`;
            } else {
                alert("Data tidak ditemukan");
                window.location.search = "";
            }
        } else { 
            fetchData(); 
        }
    }
</script>
</body>
</html>
