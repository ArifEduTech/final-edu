<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Online - ARIF EDU TECH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        .card { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-green { background: var(--success); color: white; }
        .btn-yellow { background: var(--warning); color: black; }
        .btn-red { background: var(--danger); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f1f1f1; }
        .badge { padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; text-transform: uppercase; cursor: pointer; display: inline-block; border: none; min-width: 80px; text-align: center; }
        #modalNota { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; overflow-y: auto; }
        .modal-content { background:white; max-width:700px; margin: 40px auto; padding:25px; border-radius:12px; }
        @media print { .no-print { display: none !important; } #printArea { display: block !important; } }
        #printArea { display: none; padding: 20px; font-family: monospace; border: 1px solid #000; }
    </style>
</head>
<body>

<div style="background: #0b5345; padding: 10px; text-align: left;" class="no-print">
    <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">⬅️ Keluar ke Menu Utama</a>
</div>

<div id="mainContent" class="container no-print">
    <header>
        <img src="logo.png" alt="Logo" width="150" onerror="this.src='https://via.placeholder.com/120x80?text=LOGO'">
        <h1 style="color:var(--primary); margin:0;">ARIF EDU TECH 🌐 ONLINE</h1>
        <p style="margin:5px 0;">Manajemen Servis & Dokumentasi Foto</p>
    </header>

    <div class="card">
        <h3 id="formTitle">1. Registrasi / Edit Pelanggan</h3>
        <div class="grid">
            <div><label>Nama</label><input type="text" id="custName"></div>
            <div><label>Tanggal</label><input type="date" id="entryDate"></div>
            <div><label>Tipe</label>
                <select id="serviceType">
                    <option value="Service">Service</option>
                    <option value="Produk">Produk</option>
                </select>
            </div>
            <div><label>Unit</label><input type="text" id="devName"></div>
        </div>
        <input type="text" id="kelengkapan" placeholder="Kelengkapan...">
        <textarea id="keluhan" placeholder="Keluhan..."></textarea>
        <button id="btnSimpanUtama" class="btn btn-blue" onclick="saveToCloud()">💾 SIMPAN DATA & PRINT</button>
    </div>

    <div class="card">
        <h3>2. Database Pelanggan</h3>
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama/unit...">
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Pelanggan</th>
                        <th>Tindakan & Foto Progres</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="dbBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalNota" class="no-print">
    <div class="modal-content">
        <h2>Rincian Biaya</h2>
        <div id="itemRows"></div>
        <button class="btn btn-yellow" onclick="addRow()">+ Item</button>
        <hr>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-green" style="flex:1;" onclick="finalizeNota()">CETAK NOTA LUNAS</button>
            <button class="btn btn-red" onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="text-align:center; border-bottom: 2px dashed #000; padding-bottom:10px;">
        <h2>ARIF EDU TECH</h2>
        <p>Dsn. Blabak, Kec. Kandat | HP: 087758018426/081805305278</p>
    </div>
    <div id="notaKonten"></div>
    <div id="qrPrint" style="display:flex; justify-content:center; margin:15px 0;"></div>
    <div id="qrInfoContainer" style="text-align:center;"></div>
</div>

<script>
    const _URL = "https://plwpgjwozugznrlwgtwc.supabase.co";
    const _KEY = "sb_publishable_IudfuYPNAbYypJ5_YQ-zng_SJ6tDNYP";
    const sbClient = window.supabase.createClient(_URL, _KEY);

    let activeId = null; 
    let fullData = [];

    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

    async function fetchData() {
        const { data, error } = await sbClient.from('layanan').select('*').order('created_at', { ascending: false });
        if (!error) { 
            fullData = data; 
            renderTable(data); 
        }
    }

    function renderTable(data) {
        const body = document.getElementById('dbBody');
        body.innerHTML = '';
        data.forEach(d => {
            const uploadHtml = d.status !== 'selesai' ? `
                <div style="margin-top:8px; border-top:1px solid #eee; padding-top:5px;">
                    <label style="font-size:10px; font-weight:bold; color:#666;">FOTO PROGRES:</label>
                    <input type="file" accept="image/*" onchange="uploadFoto('${d.id}', this)" style="font-size:11px;">
                    ${d.dokumentasi_proses ? `<br><small style="color:green;">✅ Ada Foto</small>` : ''}
                </div>` : '';

            body.innerHTML += `
                <tr>
                    <td><strong>${d.nama}</strong><br><small>${d.barang}</small></td>
                    <td>
                        <input type="text" value="${d.tindakan || ''}" onchange="updateTindakan('${d.id}', this.value)" placeholder="Tindakan...">
                        ${uploadHtml}
                    </td>
                    <td>
                        <button class="badge" style="background:${getStatusColor(d.status)}" onclick="updateProgres('${d.id}','${d.status}')">
                            ${d.status}
                        </button>
                    </td>
                    <td>
                        <div style="display: flex; gap: 4px;">
                            <button class="btn btn-yellow" style="padding:5px 8px;" onclick="editData('${d.id}')">✏️</button>
                            <button class="btn btn-green" style="padding:5px 8px;" onclick="openModal('${d.id}')">📝</button>
                            <button class="btn btn-blue" style="padding:5px 8px;" onclick="reprint('${d.id}')">🖨️</button>
                            <button class="btn btn-red" style="padding:5px 8px;" onclick="hapusData('${d.id}')">🗑️</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    async function uploadFoto(id, input) {
        const file = input.files[0];
        if (!file) return;
        const fileName = `${id}-${Date.now()}.${file.name.split('.').pop()}`;
        const { data, error } = await sbClient.storage.from('dokumentasi').upload(fileName, file);
        if (error) return alert("Gagal upload: " + error.message);
        const { data: { publicUrl } } = sbClient.storage.from('dokumentasi').getPublicUrl(fileName);
        await sbClient.from('layanan').update({ dokumentasi_proses: publicUrl }).eq('id', id);
        alert("Foto berhasil diunggah!");
        fetchData();
    }

    function editData(id) {
        const item = fullData.find(i => i.id == id);
        if (item) {
            activeId = id;
            document.getElementById('custName').value = item.nama;
            document.getElementById('entryDate').value = item.tgl;
            document.getElementById('serviceType').value = item.tipe;
            document.getElementById('devName').value = item.barang;
            document.getElementById('kelengkapan').value = item.kelengkapan || '';
            document.getElementById('keluhan').value = item.keluhan || '';
            
            const btn = document.getElementById('btnSimpanUtama');
            btn.innerHTML = "🆙 UPDATE DATA";
            btn.className = "btn btn-yellow";
            document.getElementById('formTitle').innerText = "✏️ Mode Edit: " + item.nama;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    async function saveToCloud() {
        const p = {
            nama: document.getElementById('custName').value,
            tgl: document.getElementById('entryDate').value,
            tipe: document.getElementById('serviceType').value,
            barang: document.getElementById('devName').value,
            kelengkapan: document.getElementById('kelengkapan').value,
            keluhan: document.getElementById('keluhan').value
        };

        if (!p.nama || !p.barang) return alert("Isi Nama & Unit!");

        if (activeId) {
            const { error } = await sbClient.from('layanan').update(p).eq('id', activeId);
            if (!error) { alert("Updated!"); resetForm(); fetchData(); }
        } else {
            p.status = 'checking'; p.tindakan = '-'; p.items = []; p.total = 0;
            const { data, error } = await sbClient.from('layanan').insert([p]).select();
            if (!error) { fetchData(); reprint(data[0].id); resetForm(); }
        }
    }

    function resetForm() {
        document.getElementById('custName').value = '';
        document.getElementById('devName').value = '';
        document.getElementById('kelengkapan').value = '';
        document.getElementById('keluhan').value = '';
        document.getElementById('formTitle').innerText = "1. Registrasi / Edit Pelanggan";
        const btn = document.getElementById('btnSimpanUtama');
        btn.innerHTML = "💾 SIMPAN DATA & PRINT";
        btn.className = "btn btn-blue";
        activeId = null;
    }

    async function updateTindakan(id, teks) { await sbClient.from('layanan').update({ tindakan: teks }).eq('id', id); }
    
    async function updateProgres(id, cur) {
        const next = cur === 'checking' ? 'proses' : (cur === 'proses' ? 'selesai' : 'checking');
        const updatePayload = { status: next };
        if(next === 'selesai') updatePayload.dokumentasi_proses = null;
        const { error } = await sbClient.from('layanan').update(updatePayload).eq('id', id);
        if(!error) fetchData();
    }

    function getStatusColor(s) { return s === 'checking' ? '#6c757d' : (s === 'proses' ? '#ffc107' : '#28a745'); }
    
    function filterTable() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        renderTable(fullData.filter(i => i.nama.toLowerCase().includes(input) || i.barang.toLowerCase().includes(input)));
    }

    function openModal(id) { activeId = id; document.getElementById('itemRows').innerHTML = ''; addRow(); document.getElementById('modalNota').style.display = 'block'; }
    function addRow() {
        const div = document.createElement('div');
        div.className = 'grid'; div.style.gridTemplateColumns = '2fr 1fr';
        div.innerHTML = `<input type="text" class="i-desc" placeholder="Item"><input type="number" class="i-price" placeholder="Harga">`;
        document.getElementById('itemRows').appendChild(div);
    }

    async function finalizeNota() {
        const rows = document.querySelectorAll('#itemRows .grid');
        let items = [], total = 0;
        rows.forEach(r => {
            const d = r.querySelector('.i-desc').value, p = r.querySelector('.i-price').value;
            if(d && p) { items.push({desc: d, price: p}); total += parseInt(p); }
        });
        await sbClient.from('layanan').update({ items, total, status: 'selesai' }).eq('id', activeId);
        closeModal(); fetchData(); reprint(activeId);
    }

 async function reprint(id) {
    const { data } = await sbClient.from('layanan').select('*').eq('id', id).single();
    
    // Logika URL QR Code: Jika selesai arahkan ke web utama, jika belum arahkan ke tracking
    let qrUrl;
    let qrLabel;
    
    if (data.status === 'selesai') {
        qrUrl = "https://final-edu-seven.vercel.app/";
        qrLabel = "Scan QR code untuk mengunjungi WEB Arif_Edu_Tech";
    } else {
        qrUrl = window.location.origin + window.location.pathname + "?id=" + id;
        qrLabel = "Scan kode QR atau kunjungi link di atas untuk cek progres service";
    }
    
    // 1. Bagian isi Nota
    let h = `<h3>${data.items && data.items.length > 0 ? 'NOTA LUNAS' : 'TANDA SERVICE'}</h3>
             <div style="text-align:left; font-size:12px;">
                <p>Tgl Masuk: ${data.tgl}<br>
                Nama: ${data.nama}<br>
                Unit: ${data.barang}<br>
                Kelengkapan: ${data.kelengkapan || '-'}<br>
                Keluhan: ${data.keluhan}</p>
             </div>`;

    if(data.items && data.items.length > 0) {
        h += `<hr><table>`;
        data.items.forEach(i => h += `<tr><td>${i.desc}</td><td style="text-align:right;">Rp ${parseInt(i.price).toLocaleString()}</td></tr>`);
        h += `</table><h4>TOTAL: Rp ${parseInt(data.total).toLocaleString()}</h4>`;
    }
    
    document.getElementById('notaKonten').innerHTML = h;
    
    // 2. Bagian Barcode (Menggunakan qrUrl yang sudah ditentukan di atas)
    document.getElementById('qrPrint').innerHTML = "";
    new QRCode(document.getElementById("qrPrint"), { 
        text: qrUrl, 
        width: 110, 
        height: 110 
    });

   // 3. Bagian Link & Tulisan Instruksi di paling bawah
    document.getElementById('qrInfoContainer').innerHTML = `
        <div style="margin-top: 10px; font-size: 10px; text-align:center;">
            <span style="word-break: break-all; font-weight: bold; color: #007bff;">${qrUrl}</span>
            <p style="margin-top: 8px; font-weight: bold; border-top: 1px dashed #ccc; padding-top: 5px;">
                ${qrLabel}
            </p>
        </div>`;

    setTimeout(() => { window.print(); }, 500);
}
    async function hapusData(id) { if(confirm("Hapus?")) { await sbClient.from('layanan').delete().eq('id', id); fetchData(); } }
    function closeModal() { document.getElementById('modalNota').style.display = 'none'; }

    window.onload = async () => {
        const p = new URLSearchParams(window.location.search);
        if(p.has('id')) {
            document.getElementById('mainContent').style.display = 'none';
            const { data } = await sbClient.from('layanan').select('*').eq('id', p.get('id')).single();
            if(data) {
                document.body.innerHTML = `
                <div style="text-align:center; padding:30px; font-family: sans-serif;">
                    <h1 style="color:#007bff;">ARIF EDU TECH</h1>
                    <h2 style="color:${getStatusColor(data.status)}; text-transform: uppercase;">${data.status}</h2>
                    <div style="text-align:left; max-width:400px; margin:auto; border:1px solid #ddd; padding:20px; border-radius:10px; background:white;">
                        <p><strong>Nama:</strong> ${data.nama}</p>
                        <p><strong>Unit:</strong> ${data.barang}</p>
                        <p><strong>Keluhan:</strong> ${data.keluhan}</p>
                        <p><strong>Progres:</strong> ${data.tindakan || '-'}</p>
                        ${data.dokumentasi_proses ? `<img src="${data.dokumentasi_proses}" style="max-width:100%; border-radius:10px; margin-top:10px;">` : ''}
                    </div>
                </div>`;
            }
        } else { fetchData(); }
    }
</script>
</body>
</html>
