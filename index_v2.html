<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Online V2 - ARIF EDU TECH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header & Logo */
        header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .logo-main { max-width: 120px; margin-bottom: 10px; }

        .card { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-green { background: var(--success); color: white; }
        .btn-yellow { background: var(--warning); color: black; }
        .btn-red { background: var(--danger); color: white; }

        .search-box { margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f1f1f1; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; text-transform: uppercase; cursor: pointer; display: inline-block; }
        
        /* Modal */
        #modalNota { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; overflow-y: auto; }
        .modal-content { background:white; max-width:700px; margin: 40px auto; padding:25px; border-radius:12px; }

        @media print { 
            .no-print { display: none !important; } 
            #printArea { display: block !important; } 
        }
        
        #printArea { display: none; padding: 20px; font-family: 'Courier New', Courier, monospace; border: 1px solid #000; width: 100%; max-width: 400px; margin: auto; }
        .logo-print { max-width: 80px; display: block; margin: 0 auto 10px auto; }
    </style>
</head>
<body>

<div id="mainContent" class="container no-print">
    <header>
        <img src="LINK_LOGO_GITHUB_RAW_ANDA" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/120x80?text=LOGO+TECH'">
<img src="https://arifedutech.github.io/final-edu/logo.png" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/120x80?text=LOGO+ERROR'">
        <h1 style="color:var(--primary); margin:0;">ARIF EDU TECH 🌐 V2</h1>
        <p style="margin:5px 0;">Pendaftaran Layanan & Penjualan</p>
    </header>

    <div class="card">
        <h3>1. Registrasi Pelanggan / Transaksi</h3>
        <div class="grid">
            <div>
                <label>Nama Pelanggan</label>
                <input type="text" id="custName" placeholder="Masukkan nama...">
            </div>
            <div>
                <label>Tipe Layanan</label>
                <select id="serviceType">
                    <option value="Service">Service / Perbaikan</option>
                    <option value="Pembelian">Pembelian Produk</option>
                </select>
            </div>
            <div>
                <label>Barang / Unit</label>
                <input type="text" id="devName" placeholder="Contoh: Laptop Acer / SSD 256GB">
            </div>
            <div>
                <label>Tanggal</label>
                <input type="date" id="entryDate">
            </div>
        </div>
        <textarea id="keluhan" placeholder="Keterangan keluhan atau spesifikasi produk..."></textarea>
        <button class="btn btn-blue" onclick="saveToCloud()">💾 SIMPAN & CETAK NOTA AWAL</button>
    </div>

    <div class="card">
        <h3>2. Riwayat & Pencarian</h3>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Cari nama pelanggan atau nama barang...">
        </div>
        <div style="overflow-x:auto;">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Nama / Tgl</th>
                        <th>Tipe</th>
                        <th>Barang</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="dbBody">
                    <tr><td colspan="5" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalNota" class="no-print">
    <div class="modal-content">
        <h2>Rincian Nota & Biaya</h2>
        <div id="itemRows"></div>
        <button class="btn btn-yellow" onclick="addRow()">+ Tambah Baris Item</button>
        <hr>
        <label>Metode Pembayaran</label>
        <select id="payMethod"><option>Tunai</option><option>Transfer</option><option>QRIS</option></select>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-green" style="flex:1;" onclick="finalizeNota()">💾 SELESAIKAN & CETAK</button>
            <button class="btn btn-red" onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="text-align:center; border-bottom: 2px dashed #000; padding-bottom:10px;">
        <img src="LINK_LOGO_GITHUB_RAW_ANDA" alt="Logo" class="logo-print" onerror="this.style.display='none'">
        <h2 style="margin:0;">ARIF EDU TECH</h2>
        <p style="margin:0; font-size:12px;">Solusi IT & Digital Service</p>
    </div>
    <div id="notaKonten" style="margin-top:15px; font-size:13px;"></div>
    <div id="qrPrint" style="display:flex; justify-content:center; margin:15px 0;"></div>
    <p style="text-align:center; font-size:10px; border-top: 1px dashed #000; padding-top:10px;">Terima kasih telah mempercayai kami.</p>
</div>

<script>
    const _URL = "https://plwpgjwozugznrlwgtwc.supabase.co";
    const _KEY = "sb_publishable_IudfuYPNAbYypJ5_YQ-zng_SJ6tDNYP";
    const sbClient = window.supabase.createClient(_URL, _KEY);

    let activeId = null;
    let fullData = [];

    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

    async function fetchData() {
        const { data, error } = await sbClient.from('layanan').select('*').order('created_at', { ascending: false });
        if (!error) { fullData = data; renderTable(data); }
    }

    function renderTable(data) {
        const body = document.getElementById('dbBody');
        body.innerHTML = '';
        data.forEach(d => {
            body.innerHTML += `
                <tr>
                    <td><strong>${d.nama}</strong><br><small>${d.tgl}</small></td>
                    <td><small>${d.tipe || 'Service'}</small></td>
                    <td>${d.barang}</td>
                    <td><span class="badge" style="background:${getStatusColor(d.status)}" onclick="updateStatus('${d.id}','${d.status}')">${d.status}</span></td>
                    <td>
                        <button class="btn btn-green" style="padding:5px 8px;" onclick="openModal('${d.id}')">💰</button>
                        <button class="btn btn-blue" style="padding:5px 8px;" onclick="reprint('${d.id}')">🖨️</button>
                        <button class="btn btn-red" style="padding:5px 8px;" onclick="hapusData('${d.id}')">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    function filterTable() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = fullData.filter(item => 
            item.nama.toLowerCase().includes(keyword) || item.barang.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    }

    function getStatusColor(s) {
        if(s === 'ceking') return '#6c757d';
        if(s === 'proses') return '#ffc107';
        return '#28a745';
    }

    async function saveToCloud() {
        const payload = {
            nama: document.getElementById('custName').value,
            tgl: document.getElementById('entryDate').value,
            tipe: document.getElementById('serviceType').value,
            barang: document.getElementById('devName').value,
            keluhan: document.getElementById('keluhan').value,
            status: 'ceking', items: [], total: 0
        };
        if(!payload.nama || !payload.barang) return alert("Lengkapi nama dan barang!");

        const { data, error } = await sbClient.from('layanan').insert([payload]).select();
        if (data) { fetchData(); reprint(data[0].id); clearForm(); }
    }

    function clearForm() {
        document.getElementById('custName').value = '';
        document.getElementById('devName').value = '';
        document.getElementById('keluhan').value = '';
    }

    function openModal(id) {
        activeId = id;
        document.getElementById('itemRows').innerHTML = '';
        addRow();
        document.getElementById('modalNota').style.display = 'block';
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = 'grid';
        div.style.gridTemplateColumns = '2fr 1fr';
        div.innerHTML = `<input type="text" class="i-desc" placeholder="Item/Jasa"><input type="number" class="i-price" placeholder="Harga">`;
        document.getElementById('itemRows').appendChild(div);
    }

    async function finalizeNota() {
        const rows = document.querySelectorAll('#itemRows .grid');
        let items = [], total = 0;
        rows.forEach(r => {
            const d = r.querySelector('.i-desc').value, p = r.querySelector('.i-price').value;
            if(d && p) { items.push({desc: d, price: p}); total += parseInt(p); }
        });
        await sbClient.from('layanan').update({ items, total, status: 'selesai' }).eq('id', activeId);
        closeModal(); fetchData(); reprint(activeId);
    }

    async function reprint(id) {
        const { data } = await sbClient.from('layanan').select('*').eq('id', id).single();
        let html = `<p>Nota ID: ${data.id.substring(0,8)}<br>Pelanggan: ${data.nama}<br>Barang: ${data.barang}<br>Tipe: ${data.tipe || 'Service'}</p><hr>`;
        
        if(data.items && data.items.length > 0) {
            html += `<table style="width:100%">`;
            data.items.forEach(i => html += `<tr><td>${i.desc}</td><td style="text-align:right">Rp ${parseInt(i.price).toLocaleString()}</td></tr>`);
            html += `<tr><td style="border-top:1px solid #000"><strong>TOTAL</strong></td><td style="border-top:1px solid #000; text-align:right"><strong>Rp ${parseInt(data.total).toLocaleString()}</strong></td></tr></table>`;
        } else {
            html += `<p>Keterangan: ${data.keluhan}</p><p style="text-align:center">--- TANDA TERIMA AWAL ---</p>`;
        }

        document.getElementById('notaKonten').innerHTML = html;
        document.getElementById('qrPrint').innerHTML = "";
        new QRCode(document.getElementById("qrPrint"), { text: window.location.href + "?id=" + id, width: 100, height: 100 });
        
        setTimeout(() => { window.print(); }, 500);
    }

    async function updateStatus(id, cur) {
        const next = cur === 'ceking' ? 'proses' : (cur === 'proses' ? 'selesai' : 'ceking');
        await sbClient.from('layanan').update({ status: next }).eq('id', id);
        fetchData();
    }

    async function hapusData(id) { if(confirm("Hapus data?")) { await sbClient.from('layanan').delete().eq('id', id); fetchData(); } }
    function closeModal() { document.getElementById('modalNota').style.display = 'none'; }

    window.onload = fetchData;
</script>

</body>
</html>
